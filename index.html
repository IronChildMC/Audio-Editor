<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Audio Editor</h1>

<input type="file" id="audioFile" accept="audio/*">

<div class="panel">

<label>Volumen ×1000</label>
<input type="range" id="volume" min="0" max="1000" value="1">

<label>Pitch</label>
<input type="range" id="pitch" min="0.1" max="10" step="0.01" value="1">

<label>Velocidad</label>
<input type="range" id="speed" min="0.1" max="10" step="0.01" value="1">

<label>Graves</label>
<input type="range" id="bass" min="-100" max="100" value="0">

<label>Medios</label>
<input type="range" id="mid" min="-100" max="100" value="0">

<label>Agudos</label>
<input type="range" id="treble" min="-100" max="100" value="0">

<label>Subgraves</label>
<input type="range" id="subbass" min="-100" max="100" value="0">

<label>Echo</label>
<input type="range" id="echo" min="0" max="1" step="0.01" value="0">

<label>Panorama</label>
<input type="range" id="pan" min="-1" max="1" step="0.01" value="0">

</div>

<div class="buttons">
<button id="play">▶</button>
<button id="pause">⏸</button>
<button id="nuclear">☢️ MODO NUCLEAR</button>
</div>

<audio id="player" controls></audio>

<script src="script.js"></script>

</body>
</html>
